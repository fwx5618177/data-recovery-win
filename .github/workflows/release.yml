name: Release

# 业界主流做法：tag 驱动发版（语义化版本），main 推送只跑 CI 不发 Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Node.js 20 deprecation 迁移：actions 自身的 JS 在 Node 24 上跑
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # =============================================================
  # 并行构建所有平台产物
  # Wails v2 的 macOS 构建必须在 macos runner 上跑（需要 Apple 工具链）；
  # Windows / Linux 用各自的原生 runner。
  # macOS 拆两个架构单独构建，避免 darwin/universal 在新 macOS 上偶发的合并异常。
  # =============================================================
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            runner: windows-latest
            platform: windows/amd64
            artifact: DataRecovery-windows-amd64.exe
            source: build/bin/DataRecovery.exe
            archive: copy
          - name: windows-arm64
            runner: windows-latest
            platform: windows/arm64
            artifact: DataRecovery-windows-arm64.exe
            source: build/bin/DataRecovery.exe
            archive: copy
          # macOS 暂时移除：Wails 在 macos runner 上 darwin/* 构建完成后没有把 .app
          # 落到 build/bin/ 下（待排查 Wails × Xcode 版本问题）。需要发布 macOS 时再打开。
          # ubuntu-22.04 仍带 libwebkit2gtk-4.0-dev；ubuntu-latest（24.04）已废弃该包
          - name: linux-amd64
            runner: ubuntu-22.04
            platform: linux/amd64
            artifact: DataRecovery-linux-amd64.tar.gz
            source: build/bin/DataRecovery
            archive: tar
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install

      - name: Wails build
        run: |
          wails build -platform ${{ matrix.platform }} \
            -ldflags "-X main.updateRepoOwner=${{ github.repository_owner }} -X main.updateRepoName=${{ github.event.repository.name }}"

      - name: List build output
        shell: bash
        run: |
          echo "=== build/bin tree ==="
          ls -la build/bin/ || true
          echo "=== find *.app / *.exe / DataRecovery ==="
          find build -maxdepth 3 \( -name "*.app" -o -name "*.exe" -o -name "DataRecovery" \) -print || true

      # ---------- 归档 / 重命名 ----------
      - name: Package (Windows exe)
        if: matrix.archive == 'copy'
        shell: bash
        run: cp "${{ matrix.source }}" "${{ matrix.artifact }}"

      - name: Package (macOS .app → zip)
        if: matrix.archive == 'zip'
        run: |
          cd build/bin
          zip -r -q "../../${{ matrix.artifact }}" "$(basename "${{ matrix.source }}")"

      - name: Package (Linux binary → tar.gz)
        if: matrix.archive == 'tar'
        run: |
          chmod +x "${{ matrix.source }}"
          tar -czf "${{ matrix.artifact }}" -C build/bin "$(basename "${{ matrix.source }}")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  # =============================================================
  # Linux 打 .deb / .rpm —— 用 nfpm（goreleaser 用的同一个工具）
  # 把 build job 出的 linux 二进制再打一层包
  # =============================================================
  linux-package:
    name: Linux .deb / .rpm
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: DataRecovery-linux-amd64.tar.gz
          path: linux-bin
      - name: Extract binary
        run: |
          mkdir -p package-staging/usr/bin
          tar -xzf linux-bin/DataRecovery-linux-amd64.tar.gz -C package-staging/usr/bin
          chmod +x package-staging/usr/bin/DataRecovery
      - name: Install nfpm
        run: |
          curl -sLo nfpm.tar.gz https://github.com/goreleaser/nfpm/releases/download/v2.39.0/nfpm_2.39.0_Linux_x86_64.tar.gz
          tar -xzf nfpm.tar.gz nfpm
          chmod +x nfpm
      - name: Generate nfpm config
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cat > nfpm.yaml <<EOF
          name: data-recovery
          arch: amd64
          version: $VERSION
          maintainer: Data Recovery Team
          description: |
            Open-source cross-platform data recovery tool —
            NTFS / FAT / exFAT / ext / APFS / HFS+ / BitLocker / RAID.
          homepage: https://github.com/${{ github.repository }}
          license: MIT
          contents:
            - src: package-staging/usr/bin/DataRecovery
              dst: /usr/bin/data-recovery
              file_info:
                mode: 0755
          recommends:
            - libgtk-3-0
            - libwebkit2gtk-4.0-37
          EOF
      - name: Build .deb
        run: ./nfpm package -p deb -t "data-recovery_${GITHUB_REF_NAME#v}_amd64.deb"
      - name: Build .rpm
        run: ./nfpm package -p rpm -t "data-recovery-${GITHUB_REF_NAME#v}-1.x86_64.rpm"
      - name: Upload .deb / .rpm
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            data-recovery_*.deb
            data-recovery-*.rpm
          if-no-files-found: error
          retention-days: 7

  # =============================================================
  # 汇总到 GitHub Release —— 单独一个 job 下载所有 artifact 再统一创建，
  # 避免多个 build job 并发写同一个 Release 的竞态。
  # =============================================================
  release:
    name: Publish Release
    needs: [build, linux-package]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 数据恢复大师 ${{ github.ref_name }}
          body: |
            ## 数据恢复大师 ${{ github.ref_name }}

            ### 按平台下载

            | 平台 | 架构 | 文件 |
            | --- | --- | --- |
            | Windows | Intel/AMD 64位 | `DataRecovery-windows-amd64.exe` |
            | Windows | ARM64 | `DataRecovery-windows-arm64.exe` |
            | Linux | amd64 | `DataRecovery-linux-amd64.tar.gz` |

            > macOS 版暂未包含，需要的用户可从源码自行 `make build-darwin` 构建。

            ### 使用方法

            - **Windows**：双击 exe 运行（会自动请求管理员权限）
            - **Linux**：`tar -xzf DataRecovery-linux-amd64.tar.gz && sudo ./DataRecovery`（读块设备需要 root）

            ### 注意事项

            - 推荐把恢复目录选在**与源盘不同的磁盘**上（同盘时可勾选"我已了解风险"强制继续，但可能覆盖待恢复扇区）
            - SSD 被重置后 TRIM 可能已擦除数据，HDD 的恢复率通常更高
            - 越早执行恢复越好，源盘后续写入会持续覆盖旧扇区
          files: dist/**/*
          fail_on_unmatched_files: true
